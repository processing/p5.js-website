name: Test, typecheck, and lint

on:
  pull_request:

permissions:
  contents: read

.common-setup: &common-setup
  - name: Checkout your repository using git
    uses: actions/checkout@v4
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '22'
  - name: Install dependencies
    run: npm ci  

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      *common-setup
      - name: Test
        run: npm run test
  lint:
    runs-on: ubuntu-latest
    steps:
      *common-setup
      - name: Lint
        run: npm run lint
  typecheck:
    runs-on: ubuntu-latest
    steps:
      *common-setup
      - name: Typecheck
        run: npm run check
  build:
    runs-on: ubuntu-latest
    steps:
      *common-setup
      - name: Build
        env:
          SKIP_BUILD_COMPRESS: 1
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm run build
