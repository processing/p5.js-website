briefPageDescriptions:
  Reference: p5.js 코드의 각 부분에 대한 쉬운 설명을 찾아보세요.
  p5.sound Reference: 오디오 입력, 재생, 분석 및 합성을 포함한 Web Audio 기능으로 p5.js를 확장하세요.
  Examples: 간단한 예제로 p5.js의 가능성을 탐험해보세요.
  Tutorials: 단계별 수업으로 p5.js를 시작하거나 기술을 향상시키세요.
  Contribute: p5.js에 함께하세요 - 만들기, 코딩, 문서 작성, 기부, 가르치기 등 다양한 방법으로 기여할 수 있습니다!
  Community: 전세계 사람들이 p5.js로 무엇을 만드는지 보고, 여러분이 만드는 것을 공유하세요.
  Sketches: p5.js 커뮤니티의 스케치로부터 영감을 받아보세요.
  Events: p5.js가 사람들을 모으는 방법을 보거나 직접 이벤트를 계획해보세요.
  Libraries: 커뮤니티가 만든 라이브러리로 p5.js의 가능성을 확장하세요.
  About: p5.js의 미션, 가치 및 주요 인물에 대해 알아보세요.
  People: p5.js 팀을 알아보세요.
contributePage:
  Statement: >
    우리 커뮤니티는 모든 형태의 기여를 소중히 여기며, 기여자라는 단어의 의미를 가능한 한 넓게 확장하고자 합니다. 여기에는 문서 작성, 교육, 코드 작성, 예술 창작, 글쓰기, 디자인, 활동, 조직, 큐레이팅 또는 여러분이 상상할 수 있는 모든 것이 포함됩니다.
  ImageAltText: >
    참여자들이 손을 높이 들며 열정적으로 미소 짓는 단체 사진.
  ImageCaption: >
    2019 p5.js 기여자 컨퍼런스 참가자들.
  DonateDescription: >
    p5.js에는 여러분의 지원이 필요합니다!
peoplePage:
  PageDescription: p5.js는 2013년 Lauren Lee McCarthy가 웹 환경을 위한 Processing의 새로운 해석으로 만들었습니다. 그 이후로 우리는 Processing과 공유 커뮤니티에서 영감을 얻으면서도 독자적으로 발전해 왔습니다. p5.js는 기여자 커뮤니티에 의해 유지되며, Processing Foundation의 지원을 받습니다. 현재 p5.js는 2020년에 시작된 순환 리더십 모델을 따르고 있습니다.
